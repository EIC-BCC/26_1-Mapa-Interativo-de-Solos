<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="470" fill="#ffffff"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#202124">Arquitetura do Mapa Interativo de Tipos de Solo</text>

  <!-- Fonte de dados -->
  <rect x="30" y="80" width="250" height="320" rx="10" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="155" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#202124">Fonte de dados</text>
  <text x="155" y="126" text-anchor="middle" font-size="11" font-style="italic" fill="#5f6368">mock-soils.vercel.app</text>

  <rect x="52" y="150" width="206" height="66" rx="6" fill="#ffffff" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="155" y="178" text-anchor="middle" font-size="12" fill="#202124">json-server (db.js)</text>
  <text x="155" y="196" text-anchor="middle" font-size="10.5" fill="#5f6368">servidor programático</text>

  <rect x="52" y="236" width="206" height="128" rx="6" fill="#ffffff" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="155" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">solos.geojson</text>
  <text x="155" y="294" text-anchor="middle" font-size="11" fill="#5f6368">IBGE</text>
  <text x="155" y="312" text-anchor="middle" font-size="11" fill="#5f6368">escala 1:5.000.000</text>
  <text x="155" y="330" text-anchor="middle" font-size="11" fill="#5f6368">SiBCS, 5ª ed. (2018)</text>
  <text x="155" y="348" text-anchor="middle" font-size="11" fill="#5f6368">~2.959 polígonos</text>

  <!-- API de interoperabilidade -->
  <rect x="335" y="80" width="250" height="360" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="460" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#202124">API de interoperabilidade</text>
  <text x="460" y="126" text-anchor="middle" font-size="11" font-style="italic" fill="#5f6368">soils-bff.vercel.app</text>

  <rect x="357" y="146" width="206" height="46" rx="6" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <text x="460" y="174" text-anchor="middle" font-size="11.5" fill="#202124">Rotas → Controller → Service</text>

  <rect x="357" y="202" width="206" height="42" rx="6" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <text x="460" y="228" text-anchor="middle" font-size="11.5" fill="#202124">Warmup + cache</text>

  <rect x="357" y="254" width="206" height="42" rx="6" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <text x="460" y="280" text-anchor="middle" font-size="11.5" fill="#202124">Normalizers</text>

  <rect x="357" y="306" width="206" height="42" rx="6" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <text x="460" y="332" text-anchor="middle" font-size="11.5" fill="#202124">Validador de geometria (Turf.js)</text>

  <rect x="357" y="358" width="206" height="46" rx="6" fill="#f1f8f3" stroke="#34a853" stroke-width="1.5"/>
  <text x="460" y="380" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#202124">Resposta padronizada</text>
  <text x="460" y="396" text-anchor="middle" font-size="11" fill="#5f6368">data + metadata</text>

  <!-- Camada de visualizacao -->
  <rect x="640" y="80" width="250" height="320" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="765" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#202124">Camada de visualização</text>
  <text x="765" y="126" text-anchor="middle" font-size="11" font-style="italic" fill="#5f6368">React + MapLibre GL</text>

  <rect x="662" y="150" width="206" height="46" rx="6" fill="#ffffff" stroke="#4285f4" stroke-width="1.5"/>
  <text x="765" y="178" text-anchor="middle" font-size="12" fill="#202124">test-app (App.tsx)</text>

  <rect x="662" y="206" width="206" height="46" rx="6" fill="#ffffff" stroke="#4285f4" stroke-width="1.5"/>
  <text x="765" y="234" text-anchor="middle" font-size="12" fill="#202124">map-manager / MapView</text>

  <rect x="662" y="262" width="206" height="102" rx="6" fill="#ffffff" stroke="#4285f4" stroke-width="1.5"/>
  <text x="765" y="294" text-anchor="middle" font-size="11.5" fill="#202124">Mapa colorido por classe</text>
  <text x="765" y="314" text-anchor="middle" font-size="11.5" fill="#202124">Painel de filtros</text>
  <text x="765" y="334" text-anchor="middle" font-size="11.5" fill="#202124">Popup de atributos</text>
  <text x="765" y="354" text-anchor="middle" font-size="11.5" fill="#202124">Legenda</text>

  <!-- Setas de fluxo de dados -->
  <line x1="282" y1="250" x2="333" y2="250" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="307" y="240" text-anchor="middle" font-size="10.5" fill="#5f6368">GeoJSON</text>

  <line x1="587" y1="250" x2="638" y2="250" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="612" y="234" text-anchor="middle" font-size="10.5" fill="#5f6368">data +</text>
  <text x="612" y="246" text-anchor="middle" font-size="10.5" fill="#5f6368">metadata</text>

  <text x="460" y="456" text-anchor="middle" font-size="10.5" font-style="italic" fill="#80868b">Fluxo dos dados: da fonte oficial até a renderização no navegador. Requisições do frontend usam os filtros soilType e soilShape.</text>
</svg>
